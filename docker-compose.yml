services:
  db:
    image: postgres:16
    container_name: trustmebroai-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trustmebroai}
      POSTGRES_USER: ${POSTGRES_USER:-trustmebro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trustmebro}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trustmebro} -d ${POSTGRES_DB:-trustmebroai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    container_name: trustmebroai-backend
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-trustmebro}:${POSTGRES_PASSWORD:-trustmebro}@db:5432/${POSTGRES_DB:-trustmebroai}
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: trustmebroai-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  db_data:
  backend_node_modules:
  frontend_node_modules:
